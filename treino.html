<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Treino — Rotina</title>
<meta name="theme-color" content="#18181b">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotina">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="stylesheet" href="/src/style.css">
<style>
  .workout-wrap {
    max-width: 500px;
    margin: 0 auto;
    padding: 1rem 1rem 2rem;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── Topbar ── */
  .wo-topbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 0.75rem;
  }
  .wo-back {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: transparent; border: 1px solid var(--border);
    color: var(--text-primary); font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-decoration: none; flex-shrink: 0;
    transition: background 0.12s ease;
  }
  .wo-back:active { background: var(--surface-2); }

  /* ── Progress bar ── */
  .wo-progress {
    height: 4px; background: var(--border); border-radius: 2px;
    margin-bottom: 1.25rem; overflow: hidden;
  }
  .wo-progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, #e88a5a 100%);
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .wo-counter {
    text-align: center; font-size: 12px; color: var(--text-muted);
    margin-bottom: 0.5rem; letter-spacing: 0.02em;
  }

  /* ── Exercise card ── */
  .wo-card {
    flex: 1;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.1rem;
    display: flex; flex-direction: column;
  }
  .wo-card h2 {
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    margin: 0 0 0.3rem; line-height: 1.2;
  }
  .wo-card .wo-series {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }
  .wo-card .wo-how {
    font-size: 14px; line-height: 1.5;
    color: var(--text-primary);
    margin-bottom: 0;
  }

  /* ── Timer ── */
  .wo-timer {
    text-align: center;
    padding: 1rem 0 0.5rem;
  }
  .wo-timer-label {
    font-size: 10.5px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .wo-timer-display {
    font-size: 42px; font-weight: 700; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    transition: color 0.3s ease;
  }
  .wo-timer-display.running { color: var(--accent); }
  .wo-timer-display.done { color: var(--gold); }

  .wo-timer-ctrls {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 8px;
  }
  .wo-timer-ctrls button {
    padding: 0.45rem 0.9rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-primary);
    font-size: 12px; font-weight: 550; cursor: pointer;
    transition: all 0.12s ease;
  }
  .wo-timer-ctrls button.primary {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 600;
  }
  .wo-timer-ctrls button.primary:active { background: #c5612e; }

  /* ── Metronome ── */
  .wo-metronome {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0.6rem 0;
  }
  .wo-metronome button {
    padding: 0.4rem 0.8rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-secondary);
    font-size: 12px; font-weight: 550; cursor: pointer;
    transition: all 0.12s ease;
  }
  .wo-metronome button.active {
    background: var(--accent-tint);
    border-color: var(--accent-dim);
    color: #ee9b6e;
  }
  .metronome-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--border);
    transition: all 0.15s ease;
  }
  .metronome-dot.beat {
    background: var(--accent);
    transform: scale(1.5);
    box-shadow: 0 0 12px rgba(217,112,62,0.5);
  }

  /* ── Actions ── */
  .wo-actions {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: auto; padding-top: 1rem;
  }
  .wo-btn {
    width: 100%; padding: 0.85rem;
    border-radius: var(--radius);
    border: none;
    font-size: 15px; font-weight: 650;
    cursor: pointer; text-align: center;
    transition: all 0.15s ease;
  }
  .wo-btn-done {
    background: var(--accent); color: #fff;
  }
  .wo-btn-done:active { background: #c5612e; transform: scale(0.98); }
  .wo-btn-done.done {
    background: var(--gold-tint);
    color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .wo-btn-next {
    background: var(--surface-2); color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .wo-btn-next:active { background: var(--border-strong); }
  .wo-btn-finish {
    background: var(--gold); color: #18181b;
  }
  .wo-btn-finish:active { background: #b88a44; }

  .wo-done-check {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 12px; color: var(--gold);
    text-align: center;
    padding: 0.3rem 0;
  }

  /* ── Landscape + Desktop ── */
  @media (orientation: landscape), (min-width: 768px) {
    .workout-wrap { max-width: 900px; }
    .wo-progress, .wo-counter { display: none; }
    .wo-main {
      display: flex; flex-direction: row; gap: 1rem;
      flex: 1;
    }
    .wo-card {
      flex: 1.2;
      max-height: none;
    }
    .wo-side {
      flex: 0.8;
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 0.75rem;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .wo-timer-display { font-size: 48px; }
    .wo-actions { padding-top: 0; }
    .wo-card h2 { font-size: 18px; }
  }

  .finish-screen {
    text-align: center; padding: 3rem 1rem;
  }
  .finish-screen .big {
    font-size: 48px; margin-bottom: 0.75rem;
  }
  .finish-screen h2 {
    font-size: 20px; margin: 0 0 0.5rem;
  }
  .finish-screen p {
    color: var(--text-secondary);
    margin-bottom: 1.5rem; font-size: 14px;
  }
  .finish-screen a {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: var(--accent); color: #fff;
    border-radius: var(--radius);
    text-decoration: none;
    font-weight: 600; font-size: 15px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/treino.js"></script>
</body>
</html>
