<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Rotina — Alimentação & Treino</title>
<meta name="theme-color" content="#18181b">
<meta name="description" content="Regista as tuas refeições e exercícios diários">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotina">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <h1>Rotina</h1>
        <div class="sub">alimentação &amp; treino</div>
      </div>
    </div>
    <div class="streak" id="streak" title="Dias consecutivos com +80% das refeições">
      <span class="icon">🔥</span> <span id="streakN">0</span>
    </div>
  </div>

  <div class="install-banner" id="banner">
    <span>Instala esta app no teu telemóvel</span>
    <button id="btnInstall">Instalar</button>
  </div>

  <div class="day-nav">
    <button id="prev">‹</button>
    <div class="day-info">
      <div class="day" id="dayLabel"></div>
      <div class="date" id="dateLabel"></div>
    </div>
    <button id="next">›</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">Refeições</div>
      <div class="value" id="mealN">0 <span class="of">/6</span></div>
      <div class="progress-bar"><div class="progress-fill" id="mealBar"></div></div>
    </div>
    <div class="stat">
      <div class="label">Exercícios</div>
      <div class="value" id="exN">0 <span class="of">/0</span></div>
      <div class="progress-bar"><div class="progress-fill" id="exBar"></div></div>
    </div>
  </div>

  <div class="weekly" id="weekly"></div>

  <div class="tabs">
    <button class="tab active" data-tab="meals">Alimentação</button>
    <button class="tab" data-tab="ex">Treino</button>
    <button class="tab" data-tab="progress">Progresso</button>
  </div>

  <div class="panel active" id="mealsPanel"></div>
  <div class="panel" id="exPanel"></div>
  <div class="panel" id="progressPanel">
    <div class="chart-legend">
      <span><span class="swatch" style="background:var(--accent)"></span> Refeições (0–6)</span>
      <span><span class="swatch" style="background:var(--gold)"></span> Exercícios (0–4)</span>
    </div>
    <div class="chart-scroll"><canvas id="chart"></canvas></div>
  </div>

  <footer>Guardado neste telemóvel · funciona offline</footer>
</div>

<script type="module" src="/src/index.js"></script>
</body>
</html>
