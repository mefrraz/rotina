<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Exercício — Rotina</title>
<meta name="theme-color" content="#18181b">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotina">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="stylesheet" href="/src/style.css">
<style>
  .topbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 1.1rem;
  }
  .back {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: transparent; border: 1px solid var(--border);
    color: var(--text-primary); font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-decoration: none; flex-shrink: 0;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .back:active { background: var(--surface-2); border-color: var(--border-strong); }
  .topbar .eyebrow {
    font-size: 10.5px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  }
  .ex-nav {
    display: flex; align-items: center; gap: 4px;
    margin-left: auto;
  }
  .ex-nav button {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s ease;
  }
  .ex-nav button:active { background: var(--surface-2); color: var(--text-primary); }
  .ex-nav button:disabled { opacity: 0.3; cursor: default; }

  h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    margin: 0 0 0.25rem; line-height: 1.2;
  }
  .day-tag {
    display: inline-block;
    font-size: 11.5px; color: #ee9b6e;
    background: var(--accent-tint);
    border: 1px solid var(--accent-dim);
    border-radius: 999px;
    padding: 0.22rem 0.65rem;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }

  .section {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.05rem;
    margin-bottom: 8px;
  }
  .section .label {
    font-size: 10.5px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 650; margin-bottom: 5px;
  }
  .section p {
    margin: 0; font-size: 14px; line-height: 1.55;
    color: var(--text-primary);
  }

  .meta-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 8px;
  }
  .meta-row .section { margin-bottom: 0; }
  .meta-row .value { font-size: 15px; font-weight: 650; margin-top: 1px; }

  .timer-section {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.05rem;
    margin-bottom: 8px;
  }
  .timer-section .label {
    font-size: 10.5px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 650; margin-bottom: 8px;
  }
  .timer-display {
    font-size: 36px; font-weight: 700; letter-spacing: -0.03em;
    text-align: center; font-variant-numeric: tabular-nums;
    margin-bottom: 10px; color: var(--text-primary);
    transition: color 0.3s ease;
  }
  .timer-display.running { color: var(--accent); }
  .timer-display.done { color: var(--gold); }
  .timer-controls {
    display: flex; gap: 6px; justify-content: center;
  }
  .timer-controls button {
    padding: 0.5rem 1rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-primary);
    font-size: 13px; font-weight: 550; cursor: pointer;
    transition: all 0.12s ease;
    flex: 1; max-width: 100px;
  }
  .timer-controls button:active { background: var(--border-strong); }
  .timer-controls button.primary {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 600;
  }
  .timer-controls button.primary:active { background: #c5612e; }

  .mark-check {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.85rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface-1);
    color: var(--text-primary);
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .mark-check:active { background: var(--surface-2); }
  .mark-check.done {
    background: var(--gold-tint);
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .mark-check svg { width: 17px; height: 17px; }

  .not-found {
    text-align: center; padding: 3rem 1rem; color: var(--text-secondary);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script type="module" src="/src/exercicio.js"></script>
</body>
</html>
