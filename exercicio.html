<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Exercício — Rotina</title>
<meta name="theme-color" content="#18181b">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotina">
<link rel="stylesheet" href="/src/style.css">
<style>
  .topbar{display:flex;align-items:center;gap:8px;margin-bottom:1.1rem}
  .back{width:36px;height:36px;border-radius:var(--rs);background:0;border:1px solid var(--border);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;flex-shrink:0;transition:background .12s}
  .back:active{background:var(--surface2)}
  .ex-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
  .ex-nav button{width:32px;height:32px;border-radius:var(--rs);background:0;border:1px solid var(--border);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
  .ex-nav button:active{background:var(--surface2);color:var(--text)}
  .ex-nav button:disabled{opacity:.3;cursor:default}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0 0 .25rem;line-height:1.2}
  .tag{display:inline-block;font-size:11.5px;color:#ee9b6e;background:var(--accent-bg);border:1px solid var(--accent-dim);border-radius:999px;padding:.22rem .65rem;margin-bottom:1.25rem;font-weight:500}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.05rem;margin-bottom:8px}
  .card .label{font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:650;margin-bottom:5px}
  .card p{margin:0;font-size:14px;line-height:1.55}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .row2 .card{margin-bottom:0}
  .row2 .val{font-size:15px;font-weight:650;margin-top:1px}
  .timer-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:8px}
  .timer-label{font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:650;margin-bottom:8px}
  .timer-display{font-size:36px;font-weight:700;letter-spacing:-.03em;text-align:center;font-variant-numeric:tabular-nums;margin-bottom:10px;transition:color .3s}
  .timer-display.run{color:var(--accent)}.timer-display.end{color:var(--gold)}
  .timer-ctrls{display:flex;gap:6px;justify-content:center}
  .timer-ctrls button{padding:.5rem 1rem;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:550;cursor:pointer;flex:1;max-width:100px;transition:all .12s}
  .timer-ctrls button.prim{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .timer-ctrls button.prim:active{background:#c5612e}
  .btn-mark{margin-top:1.25rem;width:100%;padding:.85rem;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s}
  .btn-mark:active{background:var(--surface2)}
  .btn-mark.done{background:var(--gold-bg);border-color:var(--gold-dim);color:var(--gold)}
  .btn-mark svg{width:17px;height:17px}
  .not-found{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
  @media(min-width:768px){h1{font-size:26px}.row2{grid-template-columns:1fr 1fr 1fr 1fr}.card{padding:1.2rem 1.3rem}.card p{font-size:15px}.timer-display{font-size:48px}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script type="module" src="/src/exercicio.js"></script>
</body>
</html>
